<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CV Fullscreen Pro</title>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        #container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        /* Ajuste para que no haya deformación visual */
        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        video { opacity: 0.4; }
        canvas { z-index: 2; }

        #ui-hint { position: absolute; top: 40px; width: 100%; text-align: center; z-index: 10; color: #00d4ff; font-weight: bold; pointer-events: none; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .controls { position: absolute; bottom: 50px; z-index: 10; width: 100%; display: flex; justify-content: center; }
        button { padding: 15px 30px; border-radius: 50px; border: none; background: #00d4ff; font-weight: bold; box-shadow: 0 4px 15px rgba(0,212,255,0.4); }
    </style>
</head>
<body>

<div id="ui-hint">Desliza ARRIBA/ABAJO para ajustar marco</div>

<div id="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <button id="startBtn">INICIAR ANALIZADOR</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');

    const PROC_W = 400; 
    const procCanvas = document.createElement('canvas');
    const procCtx = procCanvas.getContext('2d');

    let isRunning = false;
    let manualLimitY = 0.8; 
    let corners = [{x:0,y:0},{x:0,y:0},{x:0,y:0},{x:0,y:0}];

    // --- 1. FULLSCREEN ---
    async function enableFullScreen() {
        const doc = document.documentElement;
        if (doc.requestFullscreen) await doc.requestFullscreen();
        else if (doc.webkitRequestFullscreen) await doc.webkitRequestFullscreen();
        else if (doc.msRequestFullscreen) await doc.msRequestFullscreen();
        
        // Bloquear orientación si es posible
        if (screen.orientation && screen.orientation.lock) {
            await screen.orientation.lock('portrait').catch(e => console.log("Orientation lock no soportado"));
        }
    }

    // --- 2. INTERACCIÓN ---
    canvas.addEventListener('pointermove', (e) => {
        if (e.buttons > 0) {
            const rect = canvas.getBoundingClientRect();
            manualLimitY = Math.min(0.95, Math.abs((e.clientY - rect.top) / rect.height - 0.5) * 2);
        }
    });

    function onOpenCvReady() { console.log("OpenCV Ready"); }

    startBtn.onclick = async () => {
        await enableFullScreen();
        
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } 
        });
        video.srcObject = stream;

        video.onloadedmetadata = () => {
            // Sincronizar canvas visual con el viewport real
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            isRunning = true;
            startBtn.style.display = 'none';
            processFrame();
        };
    };

    function getIntersection(l1, l2) {
        const [x1, y1, x2, y2] = l1; const [x3, y3, x4, y4] = l2;
        const den = (x1 - x2) * (y3 - y4) - (y1 - y2) * (x3 - x4);
        if (Math.abs(den) < 0.1) return null;
        return {
            x: ((x1 * y2 - y1 * x2) * (x3 - x4) - (x1 - x2) * (x3 * y4 - y3 * x4)) / den,
            y: ((x1 * y2 - y1 * x2) * (y3 - y4) - (y1 - y2) * (x3 * y4 - y3 * x4)) / den
        };
    }

    function processFrame() {
        if (!isRunning) return;

        // --- CORRECCIÓN DE PROPORCIÓN ---
        // Usamos la relación de aspecto real del video, no de la pantalla
        const videoAspect = video.videoWidth / video.videoHeight;
        procCanvas.width = PROC_W;
        procCanvas.height = PROC_W / videoAspect; 
        procCtx.drawImage(video, 0, 0, procCanvas.width, procCanvas.height);

        let src = cv.imread(procCanvas);
        let dst = new cv.Mat();
        cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);
        cv.Canny(dst, dst, 60, 150);

        let lines = new cv.Mat();
        cv.HoughLinesP(dst, lines, 1, Math.PI/180, 30, 60, 40);

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Factores de escala para dibujar en el canvas visual (ajustado a object-fit: cover)
        // Esto compensa el estiramiento del cover
        const scaleX = canvas.width / procCanvas.width;
        const scaleY = canvas.height / procCanvas.height;
        const finalScale = Math.max(scaleX, scaleY); 
        
        const offsetX = (canvas.width - procCanvas.width * finalScale) / 2;
        const offsetY = (canvas.height - procCanvas.height * finalScale) / 2;

        const toScreen = (px, py) => ({
            x: px * finalScale + offsetX,
            y: py * finalScale + offsetY
        });

        let hLines = [], vLines = [];
        const centerY = procCanvas.height / 2;
        const searchY = (manualLimitY * procCanvas.height) / 2;

        for (let i = 0; i < lines.rows; ++i) {
            let l = [lines.data32S[i*4], lines.data32S[i*4+1], lines.data32S[i*4+2], lines.data32S[i*4+3]];
            let angle = Math.abs(Math.atan2(l[3]-l[1], l[2]-l[0]) * 180 / Math.PI);
            let midX = (l[0]+l[2])/2, midY = (l[1]+l[3])/2;

            // Debug líneas (ahora con escala corregida)
            let p1 = toScreen(l[0], l[1]);
            let p2 = toScreen(l[2], l[3]);
            ctx.strokeStyle = 'rgba(255,0,0,0.2)';
            ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();

            // Lados CORTOS (Verticales - 90%)
            if (angle > 70 && angle < 110) {
                if (midX < procCanvas.width * 0.15 || midX > procCanvas.width * 0.85) vLines.push({data: l, mid: midX});
            } 
            // Lados LARGOS (Horizontales - Usuario)
            else if (angle < 20 || angle > 160) {
                if (Math.abs(Math.abs(midY - centerY) - searchY) < 40) hLines.push({data: l, mid: midY});
            }
        }

        if (hLines.length >= 2 && vLines.length >= 2) {
            hLines.sort((a,b) => a.mid - b.mid);
            vLines.sort((a,b) => a.mid - b.mid);

            const p1 = getIntersection(hLines[0].data, vLines[0].data);
            const p2 = getIntersection(hLines[0].data, vLines[vLines.length-1].data);
            const p3 = getIntersection(hLines[hLines.length-1].data, vLines[vLines.length-1].data);
            const p4 = getIntersection(hLines[hLines.length-1].data, vLines[0].data);

            if (p1 && p2 && p3 && p4) {
                [p1, p2, p3, p4].forEach((p, i) => {
                    let s = toScreen(p.x, p.y);
                    corners[i].x += (s.x - corners[i].x) * 0.2;
                    corners[i].y += (s.y - corners[i].y) * 0.2;
                });
                drawUI(corners);
            }
        }

        // Guías de usuario corregidas
        ctx.strokeStyle = 'rgba(0, 212, 255, 0.5)';
        let g1 = toScreen(0, centerY - searchY);
        let g2 = toScreen(0, centerY + searchY);
        ctx.setLineDash([5, 5]);
        ctx.beginPath(); ctx.moveTo(0, g1.y); ctx.lineTo(canvas.width, g1.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, g2.y); ctx.lineTo(canvas.width, g2.y); ctx.stroke();
        ctx.setLineDash([]);

        src.delete(); dst.delete(); lines.delete();
        requestAnimationFrame(processFrame);
    }

    function drawUI(pts) {
        ctx.strokeStyle = '#00ff00'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
        pts.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.closePath(); ctx.stroke();
    }
</script>
</body>
</html>
