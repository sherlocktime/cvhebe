<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Estudio de Composición: Museos</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: white; font-family: sans-serif; overflow: hidden; height: 100dvh; }
        #container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; touch-action: none; }
        canvas { position: absolute; z-index: 2; pointer-events: auto; }

        #top-ui {
            position: absolute;
            top: calc(10px + env(safe-area-inset-top, 0px));
            left: 0; right: 0;
            z-index: 30;
            display: none;
            gap: 10px;
            padding: 0 15px;
            pointer-events: none;
            justify-content: center;
            align-items: center;
        }

        .ui-btn {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 1.5px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            height: 44px;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            backdrop-filter: blur(5px);
        }

        #btn-grid { flex: 1; max-width: 180px; padding: 0 10px; }
        #btn-transform { width: 60px; }
        #btn-color { width: 44px; }
        #color-dot { width: 14px; height: 14px; border-radius: 50%; background: white; border: 1.5px solid rgba(255,255,255,0.4); }
        #btn-reset { width: 44px; font-size: 22px; }

        #mainActionBtn { position: absolute; z-index: 40; padding: 18px 40px; font-size: 16px; border-radius: 30px; border: none; background: #FFCC00; color: black; font-weight: bold; cursor: pointer; }

        .controls-area {
            position: fixed;
            bottom: calc(30px + env(safe-area-inset-bottom, 0px));
            width: 100%;
            display: none;
            justify-content: center;
            z-index: 50;
        }

        #btn-next {
            width: 200px;
            height: 48px;
            border-radius: 24px;
            background: rgba(0,0,0,0.8);
            border: 1.5px solid #FFCC00;
            color: #FFCC00;
            cursor: pointer;
            pointer-events: auto;
            font-weight: bold;
        }
        
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

<div id="container">
    <canvas id="canvas"></canvas>
    
    <button id="mainActionBtn">EXPLORAR MUSEO</button>

    <div id="top-ui">
        <button id="btn-grid" class="ui-btn">Regla de Tercios</button>
        <button id="btn-transform" class="ui-btn">ALT</button>
        <button id="btn-color" class="ui-btn"><div id="color-dot"></div></button>
        <button id="btn-reset" class="ui-btn">&#8864;</button>
    </div>

    <div class="controls-area" id="controls-area">
        <button id="btn-next" class="ui-btn">SIGUIENTE PINTURA</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const grids = ['tercios', 'golden', 'tri-aureos', 'puntos-fuerza', 'cuadrado', 'fuga', 'fibonacci', 'simetria', 'diagonales'];
    const gridLabels = ['Regla de Tercios', 'Proporción Áurea', 'Triángulos Áureos', 'Puntos de Fuerza', 'Encuadre Cuadrado', '1 Punto de Fuga', 'Espiral Áurea', 'Simetría Central', 'Diagonales'];
    let gIdx = 0, transformIdx = 0, cIdx = 0;
    const colors = ['#FFFFFF', '#FF3B30', '#4CD964', '#FFCC00', '#007AFF'];

    let isRunning = false, isDragging = false, dragMode = "none";
    let fugaX = 0.5, fugaY = 0.5;
    let loadedImage = null, imgX = 0, imgY = 0, imgScale = 1;
    let initialImgX = 0, initialImgY = 0, initialScale = 1, initialDist = 0, initialCenter = { x: 0, y: 0 };
    let startTouches = [];

    // Función para Fullscreen
    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
                console.log(`Error al intentar fullscreen: ${err.message}`);
            });
        }
    }

    async function loadMuseumArt() {
        const btnMain = document.getElementById('mainActionBtn');
        const btnNext = document.getElementById('btn-next');
        
        btnMain.innerText = "BUSCANDO...";
        btnNext.classList.add('loading');
        btnNext.innerText = "CARGANDO...";

        try {
            const page = Math.floor(Math.random() * 100);
            const response = await fetch(`https://api.artic.edu/api/v1/artworks/search?q=painting&page=${page}&limit=15&fields=image_id`);
            const data = await response.json();
            const artworks = data.data.filter(a => a.image_id);
            const art = artworks[Math.floor(Math.random() * artworks.length)];
            
            // Bajamos a 600px de ancho para mayor velocidad
            const imgUrl = `https://www.artic.edu/iiif/2/${art.image_id}/full/600,/0/default.jpg`;
            
            const tempImg = new Image();
            tempImg.crossOrigin = "anonymous";
            tempImg.onload = () => {
                if (tempImg.width > tempImg.height) {
                    const tCanvas = document.createElement('canvas');
                    const tCtx = tCanvas.getContext('2d');
                    tCanvas.width = tempImg.height; tCanvas.height = tempImg.width;
                    tCtx.translate(tCanvas.width/2, tCanvas.height/2);
                    tCtx.rotate(Math.PI/2);
                    tCtx.drawImage(tempImg, -tempImg.width/2, -tempImg.height/2);
                    
                    const rotated = new Image();
                    rotated.onload = () => { loadedImage = rotated; setupView(); };
                    rotated.src = tCanvas.toDataURL();
                } else {
                    loadedImage = tempImg;
                    setupView();
                }
            };
            tempImg.src = imgUrl;
        } catch (e) {
            btnMain.innerText = "ERROR - REINTENTAR";
            btnNext.innerText = "ERROR RED";
            btnNext.classList.remove('loading');
        }
    }

    function setupView() {
        centerImage();
        isRunning = true;
        document.getElementById('mainActionBtn').style.display = "none";
        document.getElementById('top-ui').style.display = "flex";
        document.getElementById('controls-area').style.display = "flex";
        
        const btnNext = document.getElementById('btn-next');
        btnNext.classList.remove('loading');
        btnNext.innerText = "SIGUIENTE PINTURA";

        if (screen.orientation && screen.orientation.lock) screen.orientation.lock('portrait').catch(e=>{});
        render();
    }

    function centerImage() {
        if(!loadedImage) return;
        const W = window.innerWidth, H = window.innerHeight;
        const ir = loadedImage.width / loadedImage.height;
        if (ir > W/H) { imgScale = W/loadedImage.width; imgX = 0; imgY = (H - (loadedImage.height*imgScale))/2; }
        else { imgScale = H/loadedImage.height; imgY = 0; imgX = (W - (loadedImage.width*imgScale))/2; }
    }

    // --- GESTOS Y RENDER ---
    function handleStart(e) {
        if (!isRunning || !loadedImage) return;
        isDragging = true;
        startTouches = Array.from(e.touches || [e]);
        if (startTouches.length === 1) {
            if (grids[gIdx] === 'fuga') { dragMode = "fuga"; }
            else { dragMode = "pan"; initialImgX = imgX; initialImgY = imgY; }
        } else if (startTouches.length === 2) {
            dragMode = "zoom";
            initialDist = Math.hypot(startTouches[0].clientX - startTouches[1].clientX, startTouches[0].clientY - startTouches[1].clientY);
            initialScale = imgScale; initialImgX = imgX; initialImgY = imgY;
            initialCenter = { x: (startTouches[0].clientX + startTouches[1].clientX)/2, y: (startTouches[0].clientY + startTouches[1].clientY)/2 };
        }
    }

    function handleMove(e) {
        if (!isDragging || !isRunning || !loadedImage) return;
        const cur = Array.from(e.touches || [e]);
        if (cur.length === 1 && startTouches.length === 1) {
            if (dragMode === "fuga") {
                fugaX = (cur[0].clientX - imgX) / (loadedImage.width * imgScale);
                fugaY = (cur[0].clientY - imgY) / (loadedImage.height * imgScale);
            } else if (dragMode === "pan") {
                imgX = initialImgX + (cur[0].clientX - startTouches[0].clientX);
                imgY = initialImgY + (cur[0].clientY - startTouches[0].clientY);
            }
        } else if (cur.length === 2) {
            const newDist = Math.hypot(cur[0].clientX - cur[1].clientX, cur[0].clientY - cur[1].clientY);
            const scaleFactor = newDist / initialDist;
            imgScale = Math.max(0.1, Math.min(10, initialScale * scaleFactor));
            const newCenter = { x: (cur[0].clientX + cur[1].clientX)/2, y: (cur[0].clientY + cur[1].clientY)/2 };
            imgX = initialImgX + (newCenter.x - initialCenter.x);
            imgY = initialImgY + (newCenter.y - initialCenter.y);
        }
    }

    canvas.addEventListener('touchstart', (e)=>{e.preventDefault(); handleStart(e);}, {passive:false});
    canvas.addEventListener('touchmove', (e)=>{e.preventDefault(); handleMove(e);}, {passive:false});
    canvas.addEventListener('touchend', ()=>isDragging=false);
    canvas.addEventListener('mousedown', handleStart);
    window.addEventListener('mousemove', (e)=>isDragging && handleMove(e));
    window.addEventListener('mouseup', ()=>isDragging=false);

    function render() {
        if (!isRunning) return;
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#111'; ctx.fillRect(0,0,canvas.width,canvas.height);
        
        if (loadedImage) {
            const rw = loadedImage.width * imgScale, rh = loadedImage.height * imgScale;
            ctx.drawImage(loadedImage, imgX, imgY, rw, rh);
            ctx.save();
            ctx.beginPath(); ctx.rect(imgX, imgY, rw, rh); ctx.clip();
            ctx.save();
            const cx = imgX + rw/2, cy = imgY + rh/2;
            if (transformIdx===1) { ctx.translate(2*cx,0); ctx.scale(-1,1); }
            else if (transformIdx===2) { ctx.translate(2*cx, 2*cy); ctx.rotate(Math.PI); }
            else if (transformIdx===3) { ctx.translate(0, 2*cy); ctx.scale(1,-1); }
            ctx.strokeStyle = colors[cIdx]; ctx.lineWidth = 1.5;
            dibujarGrilla(grids[gIdx], imgX, imgY, rw, rh);
            ctx.restore();
            ctx.restore();
            ctx.strokeStyle = colors[cIdx]; ctx.lineWidth = 2; ctx.strokeRect(imgX, imgY, rw, rh);
        }
        requestAnimationFrame(render);
    }

    function dibujarGrilla(mode, x, y, w, h) {
        if (mode === 'tercios') {
            for(let i=1; i<3; i++) { line(x+w*i/3, y, x+w*i/3, y+h); line(x, y+h*i/3, x+w, y+h*i/3); }
        } else if (mode === 'golden') {
            const p = 0.618;
            line(x+w*p, y, x+w*p, y+h); line(x+w*(1-p), y, x+w*(1-p), y+h);
            line(x, y+h*p, x+w, y+h*p); line(x, y+h*(1-p), x+w, y+h*(1-p));
        } else if (mode === 'tri-aureos') {
            line(x, y+h, x+w, y);
            const dx=w, dy=-h;
            const t1 = ((0)*dx + (-h)*dy)/(dx*dx+dy*dy); line(x,y, x+t1*dx, y+h+t1*dy);
            const t2 = ((w)*dx + (0)*dy)/(dx*dx+dy*dy); line(x+w,y+h, x+t2*dx, y+h+t2*dy);
        } else if (mode === 'fibonacci') {
            let cX=x, cY=y, cW=w, cH=h;
            for(let i=0; i<7; i++) {
                let s = Math.min(cW, cH);
                if (i%4===0) { ctx.strokeRect(cX, cY+cH-s, cW, s); cH-=s; }
                else if (i%4===1) { ctx.strokeRect(cX+cW-s, cY, s, cH); cW-=s; }
                else if (i%4===2) { ctx.strokeRect(cX, cY, cW, s); cY+=s; cH-=s; }
                else if (i%4===3) { ctx.strokeRect(cX, cY, s, cH); cX+=s; cW-=s; }
            }
        } else if (mode === 'fuga') {
            const fx=x+w*fugaX, fy=y+h*fugaY;
            line(x,y,fx,fy); line(x+w,y,fx,fy); line(x,y+h,fx,fy); line(x+w,y+h,fx,fy);
            ctx.beginPath(); ctx.arc(fx,fy,5,0,7); ctx.fill();
        } else if (mode === 'puntos-fuerza') {
            for(let i=1; i<3; i++) for(let j=1; j<3; j++) { ctx.beginPath(); ctx.arc(x+w*i/3, y+h*j/3, 8, 0, 7); ctx.stroke(); }
        } else if (mode === 'cuadrado') {
            const s = Math.min(w,h); ctx.strokeRect(x+(w-s)/2, y+(h-s)/2, s, s);
        } else if (mode === 'simetria') {
            line(x+w/2, y, x+w/2, y+h); line(x, y+h/2, x+w, y+h/2);
        } else if (mode === 'diagonales') {
            line(x,y,x+w,y+h); line(x+w,y,x,y+h);
        }
    }

    function line(x1,y1,x2,y2) { ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); }

    document.getElementById('mainActionBtn').addEventListener('click', () => {
        toggleFullScreen();
        loadMuseumArt();
    });

    document.getElementById('btn-next').addEventListener('click', loadMuseumArt);
    document.getElementById('btn-grid').addEventListener('click', (e) => { gIdx = (gIdx+1)%grids.length; e.target.textContent = gridLabels[gIdx]; });
    document.getElementById('btn-transform').addEventListener('click', () => transformIdx = (transformIdx+1)%4);
    document.getElementById('btn-color').addEventListener('click', () => { cIdx=(cIdx+1)%colors.length; document.getElementById('color-dot').style.background=colors[cIdx]; });
    
    document.getElementById('btn-reset').addEventListener('click', () => { 
        toggleFullScreen();
        centerImage(); 
        transformIdx=0; 
        fugaX = 0.5;
        fugaY = 0.5;
    });

</script>
</body>
</html>
