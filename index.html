<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CV - Ajuste Lado Largo (Vertical)</title>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; color: white; font-family: system-ui; overflow: hidden; touch-action: none; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        video { opacity: 0.4; }
        canvas { z-index: 2; pointer-events: auto; }
        #ui-hint { position: absolute; top: 20px; width: 100%; text-align: center; z-index: 10; font-size: 14px; pointer-events: none; text-shadow: 0 2px 4px #000; }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; z-index: 10; }
        button { padding: 12px 24px; border-radius: 30px; border: none; background: #00d4ff; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui-hint">Desliza ARRIBA/ABAJO para ajustar el alto del cuadro</div>
<div id="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="controls"><button id="startBtn">INICIAR ANALIZADOR</button></div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');

    const PROC_W = 400;
    const procCanvas = document.createElement('canvas');
    const procCtx = procCanvas.getContext('2d');

    let corners = [{x:0,y:0},{x:0,y:0},{x:0,y:0},{x:0,y:0}];
    let isRunning = false;
    
    // manualLimitY define la separación de las líneas horizontales (lado largo)
    let manualLimitY = 0.85; 

    canvas.addEventListener('pointermove', (e) => {
        if (e.buttons > 0) {
            const rect = canvas.getBoundingClientRect();
            // Calculamos la distancia desde el centro horizontal hacia arriba/abajo
            manualLimitY = Math.min(0.98, Math.abs((e.clientY - rect.top) / rect.height - 0.5) * 2);
        }
    });

    function onOpenCvReady() { console.log("OpenCV Listo"); }

    startBtn.onclick = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            isRunning = true;
            startBtn.style.display = 'none';
            processFrame();
        };
    };

    function getIntersection(l1, l2) {
        const [x1, y1, x2, y2] = l1; const [x3, y3, x4, y4] = l2;
        const den = (x1 - x2) * (y3 - y4) - (y1 - y2) * (x3 - x4);
        if (Math.abs(den) < 0.1) return null;
        return {
            x: ((x1 * y2 - y1 * x2) * (x3 - x4) - (x1 - x2) * (x3 * y4 - y3 * x4)) / den,
            y: ((x1 * y2 - y1 * x2) * (y3 - y4) - (y1 - y2) * (x3 * y4 - y3 * x4)) / den
        };
    }

    function processFrame() {
        if (!isRunning) return;

        procCanvas.width = PROC_W;
        procCanvas.height = (canvas.height / canvas.width) * PROC_W;
        procCtx.drawImage(video, 0, 0, procCanvas.width, procCanvas.height);

        let src = cv.imread(procCanvas);
        let dst = new cv.Mat();
        cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);
        cv.Canny(dst, dst, 60, 150);

        let lines = new cv.Mat();
        cv.HoughLinesP(dst, lines, 1, Math.PI/180, 30, 50, 40);

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const toVisualW = canvas.width / procCanvas.width;
        const toVisualH = canvas.height / procCanvas.height;

        let hLines = []; // Lados LARGOS (Horizontales)
        let vLines = []; // Lados CORTOS (Verticales)

        const centerInProcY = procCanvas.height / 2;
        const searchLimitY = (manualLimitY * procCanvas.height) / 2;

        for (let i = 0; i < lines.rows; ++i) {
            let l = [lines.data32S[i*4], lines.data32S[i*4+1], lines.data32S[i*4+2], lines.data32S[i*4+3]];
            let angle = Math.abs(Math.atan2(l[3]-l[1], l[2]-l[0]) * 180 / Math.PI);
            let midX = (l[0]+l[2])/2;
            let midY = (l[1]+l[3])/2;

            // Debug líneas rojas
            ctx.strokeStyle = 'rgba(255,0,0,0.15)';
            ctx.beginPath(); ctx.moveTo(l[0]*toVisualW, l[1]*toVisualH); ctx.lineTo(l[2]*toVisualW, l[3]*toVisualH); ctx.stroke();

            // 1. Lados Cortos (Verticales): Fijos a los costados (85-90% del ancho)
            if (angle > 75 && angle < 105) {
                if (midX < procCanvas.width * 0.15 || midX > procCanvas.width * 0.85) {
                    vLines.push({data: l, mid: midX});
                }
            } 
            // 2. Lados Largos (Horizontales): Cerca de las guías de usuario (Y)
            else if (angle < 15 || angle > 165) {
                let distFromGuide = Math.abs(Math.abs(midY - centerInProcY) - searchLimitY);
                if (distFromGuide < 40) { // Margen de búsqueda
                    hLines.push({data: l, mid: midY});
                }
            }
        }

        if (hLines.length >= 2 && vLines.length >= 2) {
            hLines.sort((a,b) => a.mid - b.mid);
            vLines.sort((a,b) => a.mid - b.mid);

            // Intersecciones para las 4 esquinas
            const pTL = getIntersection(hLines[0].data, vLines[0].data);
            const pTR = getIntersection(hLines[0].data, vLines[vLines.length-1].data);
            const pBR = getIntersection(hLines[hLines.length-1].data, vLines[vLines.length-1].data);
            const pBL = getIntersection(hLines[hLines.length-1].data, vLines[0].data);

            if (pTL && pTR && pBR && pBL) {
                [pTL, pTR, pBR, pBL].forEach((p, i) => {
                    corners[i].x += (p.x * toVisualW - corners[i].x) * 0.2;
                    corners[i].y += (p.y * toVisualH - corners[i].y) * 0.2;
                });
                drawUI(corners);
            }
        }

        // Guías de usuario (Horizontales en Cyan)
        ctx.strokeStyle = 'rgba(0, 212, 255, 0.6)';
        ctx.setLineDash([5, 5]);
        const visualYTop = (centerInProcY - searchLimitY) * toVisualH;
        const visualYBot = (centerInProcY + searchLimitY) * toVisualH;
        ctx.beginPath(); ctx.moveTo(0, visualYTop); ctx.lineTo(canvas.width, visualYTop); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, visualYBot); ctx.lineTo(canvas.width, visualYBot); ctx.stroke();
        ctx.setLineDash([]);

        src.delete(); dst.delete(); lines.delete();
        requestAnimationFrame(processFrame);
    }

    function drawUI(pts) {
        ctx.strokeStyle = '#00ff00'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
        pts.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.closePath(); ctx.stroke();
    }
</script>
</body>
</html>
