<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Analizar Composición - Museo Integrado</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: white; font-family: sans-serif; overflow: hidden; height: 100dvh; }
        #container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; touch-action: none; }
        canvas { position: absolute; z-index: 2; pointer-events: auto; }

        #top-ui {
            position: absolute;
            top: calc(10px + env(safe-area-inset-top, 0px));
            left: 0; right: 0;
            z-index: 30;
            display: none;
            gap: 10px;
            padding: 0 15px;
            pointer-events: none;
            justify-content: center;
            align-items: center;
        }

        .ui-btn {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 1.5px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            height: 44px;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            backdrop-filter: blur(5px);
        }

        #btn-grid { flex: 1; max-width: 180px; padding: 0 10px; }
        #btn-transform { width: 60px; padding: 0 5px; font-size: 11px; }
        #btn-color { width: 44px; padding: 0; }
        #color-dot { width: 14px; height: 14px; border-radius: 50%; background: white; border: 1.5px solid rgba(255,255,255,0.4); }
        #btn-reset { width: 44px; font-size: 22px; }

        #mainActionBtn { position: absolute; z-index: 40; padding: 18px 40px; font-size: 16px; border-radius: 30px; border: none; background: white; color: black; font-weight: bold; cursor: pointer; }

        .controls-area {
            position: fixed;
            bottom: calc(30px + env(safe-area-inset-bottom, 0px));
            width: 100%;
            display: none;
            justify-content: center;
            gap: 10px;
            pointer-events: none;
            z-index: 50;
        }

        #btn-change {
            width: 160px;
            height: 48px;
            border-radius: 24px;
            background: rgba(0,0,0,0.7);
            border: 1px solid white;
            color: white;
            cursor: pointer;
            pointer-events: auto;
            font-weight: bold;
        }

        #btn-museum {
            width: 60px;
            height: 48px;
            border-radius: 24px;
            background: rgba(0,0,0,0.7);
            border: 1px solid #FFCC00;
            color: #FFCC00;
            cursor: pointer;
            pointer-events: auto;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

<div id="container">
    <canvas id="canvas"></canvas>
    <input type="file" id="file-input" accept="image/*" style="display: none;">

    <button id="mainActionBtn">CARGAR FOTO</button>

    <div id="top-ui">
        <button id="btn-grid" class="ui-btn">Regla de Tercios</button>
        <button id="btn-transform" class="ui-btn" title="Girar y Reflejar">ALT</button>
        <button id="btn-color" class="ui-btn"><div id="color-dot"></div></button>
        <button id="btn-reset" class="ui-btn" title="Reset">&#8864;</button>
    </div>

    <div class="controls-area" id="controls-area">
        <button id="btn-change" class="ui-btn">Cambiar Foto</button>
        <button id="btn-museum" class="ui-btn" title="Pintura Aleatoria">🏛️</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const grids = ['tercios', 'golden', 'tri-aureos', 'puntos-fuerza', 'cuadrado', 'fuga', 'fibonacci', 'simetria', 'diagonales'];
    const gridLabels = ['Regla de Tercios', 'Proporción Áurea', 'Triángulos Áureos', 'Puntos de Fuerza', 'Encuadre Cuadrado', '1 Punto de Fuga', 'Espiral Áurea', 'Simetría Central', 'Diagonales'];
    let gIdx = 0;
    let transformIdx = 0;

    const colors = ['#FFFFFF', '#FF3B30', '#4CD964', '#FFCC00', '#007AFF'];
    let cIdx = 0;

    let isRunning = false;
    let isDragging = false;
    let dragMode = "none";
    let fugaX = 0.5;
    let fugaY = 0.5;
    let marginX = 0.05;
    let borderY = 0.25;

    let loadedImage = null;
    let imgX = 0;
    let imgY = 0;
    let imgScale = 1;
    let initialImgX = 0;
    let initialImgY = 0;
    let initialScale = 1;
    let startTouches = [];
    let initialDist = 0;
    let initialCenter = { x: 0, y: 0 };

    async function lockPortrait() {
        try { if (screen.orientation && screen.orientation.lock) await screen.orientation.lock('portrait'); } catch (e) {}
    }

    function centerImage() {
        if (!loadedImage) return;
        const W = window.innerWidth;
        const H = window.innerHeight;
        const imgRatio = loadedImage.width / loadedImage.height;
        const screenRatio = W / H;

        if (imgRatio > screenRatio) {
            imgScale = W / loadedImage.width;
            imgX = 0;
            imgY = (H - (loadedImage.height * imgScale)) / 2;
        } else {
            imgScale = H / loadedImage.height;
            imgY = 0;
            imgX = (W - (loadedImage.width * imgScale)) / 2;
        }
    }

    // Procesa la rotación si la imagen es horizontal
    function processImageRotation(img, callback) {
        if (img.width > img.height) {
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = img.height;
            tempCanvas.height = img.width;
            tempCtx.translate(tempCanvas.width / 2, tempCanvas.height / 2);
            tempCtx.rotate(Math.PI / 2);
            tempCtx.drawImage(img, -img.width / 2, -img.height / 2);

            const rotatedImage = new Image();
            rotatedImage.onload = () => callback(rotatedImage);
            rotatedImage.src = tempCanvas.toDataURL();
        } else {
            callback(img);
        }
    }

    // Carga desde Museo
    async function fetchRandomPainting() {
        const btnM = document.getElementById('btn-museum');
        btnM.classList.add('loading');
        btnM.innerText = "⏳";

        try {
            const seed = Math.floor(Math.random() * 60);
            const response = await fetch(`https://api.artic.edu/api/v1/artworks/search?q=painting&page=${seed}&limit=15&fields=id,title,image_id`);
            const data = await response.json();
            const artworks = data.data.filter(art => art.image_id);
            const art = artworks[Math.floor(Math.random() * artworks.length)];
            const imageUrl = `https://www.artic.edu/iiif/2/${art.image_id}/full/800,/0/default.jpg`;

            const tempImg = new Image();
            tempImg.crossOrigin = "Anonymous";
            tempImg.onload = () => {
                processImageRotation(tempImg, (finalImg) => {
                    loadedImage = finalImg;
                    finishImageLoad();
                    btnM.classList.remove('loading');
                    btnM.innerText = "🏛️";
                });
            };
            tempImg.src = imageUrl;
        } catch (error) {
            btnM.innerText = "❌";
            setTimeout(() => btnM.innerText = "🏛️", 2000);
            btnM.classList.remove('loading');
        }
    }

    function handleStart(e) {
        if (!isRunning || !loadedImage) return;
        isDragging = true;
        const rect = canvas.getBoundingClientRect();
        startTouches = Array.from(e.touches || [e]);

        if (startTouches.length === 1) {
            const touch = startTouches[0];
            if (grids[gIdx] === 'fuga') {
                dragMode = "fuga";
            } else {
                dragMode = "pan";
                initialImgX = imgX;
                initialImgY = imgY;
            }
        } else if (startTouches.length === 2) {
            dragMode = "zoom";
            initialDist = Math.hypot(startTouches[0].clientX - startTouches[1].clientX, startTouches[0].clientY - startTouches[1].clientY);
            initialScale = imgScale;
            initialImgX = imgX;
            initialImgY = imgY;
            initialCenter = { x: (startTouches[0].clientX + startTouches[1].clientX) / 2, y: (startTouches[0].clientY + startTouches[1].clientY) / 2 };
        }
    }

    function handleMove(e) {
        if (!isDragging || !isRunning || !loadedImage) return;
        const currentTouches = Array.from(e.touches || [e]);
        const rect = canvas.getBoundingClientRect();

        if (currentTouches.length === 1 && startTouches.length === 1) {
            if (dragMode === "fuga" && grids[gIdx] === 'fuga') {
                const touchX = currentTouches[0].clientX - rect.left;
                const touchY = currentTouches[0].clientY - rect.top;
                fugaX = (touchX - imgX) / (loadedImage.width * imgScale);
                fugaY = (touchY - imgY) / (loadedImage.height * imgScale);
                fugaX = Math.max(-0.5, Math.min(1.5, fugaX));
                fugaY = Math.max(-0.5, Math.min(1.5, fugaY));
            } else if (dragMode === "pan") {
                imgX = initialImgX + (currentTouches[0].clientX - startTouches[0].clientX);
                imgY = initialImgY + (currentTouches[0].clientY - startTouches[0].clientY);
            }
        } else if (currentTouches.length === 2 && startTouches.length === 2) {
            const newDist = Math.hypot(currentTouches[0].clientX - currentTouches[1].clientX, currentTouches[0].clientY - currentTouches[1].clientY);
            const scaleFactor = newDist / initialDist;
            imgScale = Math.max(0.1, Math.min(10, initialScale * scaleFactor));
            const newCenter = { x: (currentTouches[0].clientX + currentTouches[1].clientX) / 2, y: (currentTouches[0].clientY + currentTouches[1].clientY) / 2 };
            imgX = initialImgX + (newCenter.x - initialCenter.x);
            imgY = initialImgY + (newCenter.y - initialCenter.y);
        }
    }

    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleStart(e); }, {passive: false});
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e); }, {passive: false});
    canvas.addEventListener('touchend', () => isDragging = false);
    canvas.addEventListener('mousedown', handleStart);
    window.addEventListener('mousemove', (e) => isDragging && handleMove(e));
    window.addEventListener('mouseup', () => isDragging = false);

    function render() {
        if (!isRunning) { requestAnimationFrame(render); return; }
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const W = canvas.width, H = canvas.height;
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(0, 0, W, H);

        if (loadedImage) {
            const rw = loadedImage.width * imgScale;
            const rh = loadedImage.height * imgScale;
            ctx.drawImage(loadedImage, imgX, imgY, rw, rh);
            ctx.save();
            ctx.beginPath(); ctx.rect(imgX, imgY, rw, rh); ctx.clip();

            ctx.save();
            const cx = imgX + rw / 2, cy = imgY + rh / 2;
            if (transformIdx === 1) { ctx.translate(2 * cx, 0); ctx.scale(-1, 1); }
            else if (transformIdx === 2) { ctx.translate(2 * cx, 2 * cy); ctx.rotate(Math.PI); }
            else if (transformIdx === 3) { ctx.translate(0, 2 * cy); ctx.scale(1, -1); }

            ctx.strokeStyle = colors[cIdx]; ctx.fillStyle = colors[cIdx]; ctx.lineWidth = 1.5;
            dibujarGrilla(grids[gIdx], imgX, imgY, rw, rh);
            ctx.restore();
            ctx.restore();

            ctx.strokeStyle = colors[cIdx]; ctx.lineWidth = 2.5;
            ctx.strokeRect(imgX, imgY, rw, rh);
        }
        requestAnimationFrame(render);
    }

    function dibujarGrilla(mode, x, y, rectW, rectH) {
        if (mode === 'fuga') {
            const fx = x + rectW * fugaX, fy = y + rectH * fugaY;
            ctx.setLineDash([6, 4]); line(x-2000, fy, x+rectW+2000, fy); line(fx, y-2000, fx, y+rectH+2000); ctx.setLineDash([]);
            line(x, y, fx, fy); line(x + rectW, y, fx, fy); line(x, y + rectH, fx, fy); line(x + rectW, y + rectH, fx, fy);
            ctx.beginPath(); ctx.arc(fx, fy, 6, 0, 7); ctx.fill();
        } else if (mode === 'tercios') {
            for(let i=1; i<3; i++) { line(x + rectW*i/3, y, x + rectW*i/3, y + rectH); line(x, y + rectH*i/3, x + rectW, y + rectH*i/3); }
        } else if (mode === 'tri-aureos') {
            line(x, y + rectH, x + rectW, y);
            const dx = rectW, dy = -rectH;
            const t1 = ((x-x)*dx + (y-(y+rectH))*dy) / (dx*dx + dy*dy);
            line(x, y, x + t1*dx, (y+rectH) + t1*dy);
            const t2 = ((x+rectW-x)*dx + (y+rectH-(y+rectH))*dy) / (dx*dx + dy*dy);
            line(x+rectW, y+rectH, x + t2*dx, (y+rectH) + t2*dy);
        } else if (mode === 'fibonacci') {
            let cX = x, cY = y, cW = rectW, cH = rectH;
            for (let i = 0; i < 7; i++) {
                let side = Math.min(cW, cH);
                const step = i % 4;
                if (step === 0) { ctx.strokeRect(cX, cY + cH - side, cW, side); cH -= side; }
                else if (step === 1) { ctx.strokeRect(cX + cW - side, cY, side, cH); cW -= side; }
                else if (step === 2) { ctx.strokeRect(cX, cY, cW, side); cY += side; cH -= side; }
                else if (step === 3) { ctx.strokeRect(cX, cY, side, cH); cX += side; cW -= side; }
                if (cW < 4 || cH < 4) break;
            }
        } else if (mode === 'puntos-fuerza') {
            for(let i=1; i<3; i++) for(let j=1; j<3; j++) { ctx.beginPath(); ctx.arc(x + rectW*i/3, y + rectH*j/3, 8, 0, 7); ctx.stroke(); }
        } else if (mode === 'cuadrado') {
            const s = Math.min(rectW, rectH); ctx.strokeRect(x + (rectW-s)/2, y + (rectH-s)/2, s, s);
        } else if (mode === 'simetria') {
            line(x + rectW/2, y, x + rectW/2, y + rectH); line(x, y + rectH/2, x + rectW, y + rectH/2);
        } else if (mode === 'golden') {
            const p = 0.618;
            line(x+rectW*p, y, x+rectW*p, y+rectH); line(x+rectW*(1-p), y, x+rectW*(1-p), y+rectH);
            line(x, y+rectH*p, x+rectW, y+rectH*p); line(x, y+rectH*(1-p), x+rectW, y+rectH*(1-p));
        } else if (mode === 'diagonales') {
            line(x, y, x+rectW, y+rectH); line(x+rectW, y, x, y+rectH);
        }
    }

    function line(x1, y1, x2, y2) { ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke(); }

    document.getElementById('mainActionBtn').addEventListener('click', () => document.getElementById('file-input').click());
    document.getElementById('btn-change').addEventListener('click', () => document.getElementById('file-input').click());
    document.getElementById('btn-museum').addEventListener('click', fetchRandomPainting);

    document.getElementById('file-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => processImageRotation(img, (finalImg) => { loadedImage = finalImg; finishImageLoad(); });
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }
    });

    function finishImageLoad() {
        centerImage();
        isRunning = true;
        document.getElementById('mainActionBtn').style.display = "none";
        document.getElementById('top-ui').style.display = "flex";
        document.getElementById('controls-area').style.display = "flex";
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(() => {});
        lockPortrait();
    }

    document.getElementById('btn-grid').addEventListener('click', (e) => {
        gIdx = (gIdx + 1) % grids.length;
        transformIdx = 0;
        e.target.textContent = gridLabels[gIdx];
    });

    document.getElementById('btn-transform').addEventListener('click', () => transformIdx = (transformIdx + 1) % 4);
    document.getElementById('btn-color').addEventListener('click', () => {
        cIdx = (cIdx + 1) % colors.length;
        document.getElementById('color-dot').style.background = colors[cIdx];
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
        if (loadedImage) { centerImage(); fugaX = 0.5; fugaY = 0.5; transformIdx = 0; }
    });

    render();
</script>
</body>
</html>
