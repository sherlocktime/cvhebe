<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CV Fix - Coordenadas Reales</title>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; color: white; font-family: system-ui; overflow: hidden; touch-action: none; }
        #container { position: relative; width: 100vw; height: 100vh; }
        /* El video y el canvas deben ocupar el mismo espacio exacto */
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        video { opacity: 0.5; }
        canvas { z-index: 2; pointer-events: auto; }
        #ui-hint { position: absolute; top: 20px; width: 100%; text-align: center; z-index: 10; pointer-events: none; }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; z-index: 10; gap: 10px; }
        button { padding: 12px 24px; border-radius: 30px; border: none; background: #00d4ff; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui-hint">Toca el cuadro para filtrar ruido</div>
<div id="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <button id="startBtn">INICIAR</button>
        <button id="resetBtn" style="background:#555">RESET</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');

    const procCanvas = document.createElement('canvas');
    const procCtx = procCanvas.getContext('2d');
    const PROC_W = 450; 

    let corners = [{x:0,y:0},{x:0,y:0},{x:0,y:0},{x:0,y:0}];
    let isRunning = false;
    let userFocus = null; // Coordenadas NORMALIZADAS (0 a 1)

    function onOpenCvReady() { console.log("OpenCV Ready"); }

    // CORRECCIÓN: Captura de coordenadas relativas al elemento
    canvas.addEventListener('pointerdown', (e) => {
        const rect = canvas.getBoundingClientRect();
        // Guardamos la posición como porcentaje (0.0 a 1.0) para que sea independiente de la resolución
        userFocus = {
            x: (e.clientX - rect.left) / rect.width,
            y: (e.clientY - rect.top) / rect.height
        };
    });

    resetBtn.onclick = () => { userFocus = null; };

    startBtn.onclick = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'environment', width: { ideal: 1280 } } 
        });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            // Sincronizamos el tamaño interno del canvas con el tamaño visual
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            isRunning = true;
            startBtn.style.display = 'none';
            processFrame();
        };
    };

    function getIntersection(l1, l2) {
        const [x1, y1, x2, y2] = l1;
        const [x3, y3, x4, y4] = l2;
        const den = (x1 - x2) * (y3 - y4) - (y1 - y2) * (x3 - x4);
        if (Math.abs(den) < 0.1) return null;
        return {
            x: ((x1 * y2 - y1 * x2) * (x3 - x4) - (x1 - x2) * (x3 * y4 - y3 * x4)) / den,
            y: ((x1 * y2 - y1 * x2) * (y3 - y4) - (y1 - y2) * (x3 * y4 - y3 * x4)) / den
        };
    }

    function processFrame() {
        if (!isRunning) return;

        // 1. Dibujamos en el canvas de proceso respetando la resolución baja
        procCanvas.width = PROC_W;
        procCanvas.height = (canvas.height / canvas.width) * PROC_W;
        procCtx.drawImage(video, 0, 0, procCanvas.width, procCanvas.height);

        let src = cv.imread(procCanvas);
        let dst = new cv.Mat();
        cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);
        cv.Canny(dst, dst, 60, 160);

        let lines = new cv.Mat();
        cv.HoughLinesP(dst, lines, 1, Math.PI/180, 30, 60, 30);

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        let hLines = [];
        let vLines = [];

        // Convertimos el foco del usuario a píxeles de procCanvas
        let focusInProc = userFocus ? { 
            x: userFocus.x * procCanvas.width, 
            y: userFocus.y * procCanvas.height 
        } : null;

        for (let i = 0; i < lines.rows; ++i) {
            let l = [lines.data32S[i*4], lines.data32S[i*4+1], lines.data32S[i*4+2], lines.data32S[i*4+3]];
            let dx = l[2] - l[0], dy = l[3] - l[1];
            let angle = Math.abs(Math.atan2(dy, dx) * 180 / Math.PI);
            let midX = (l[0]+l[2])/2, midY = (l[1]+l[3])/2;

            // Debug de líneas detectadas
            ctx.strokeStyle = 'rgba(255, 50, 50, 0.15)';
            ctx.beginPath();
            ctx.moveTo(l[0] * (canvas.width/procCanvas.width), l[1] * (canvas.height/procCanvas.height));
            ctx.lineTo(l[2] * (canvas.width/procCanvas.width), l[3] * (canvas.height/procCanvas.height));
            ctx.stroke();

            // FILTRO DE INTERÉS: Solo líneas cerca del toque
            if (focusInProc) {
                let dist = Math.sqrt((midX - focusInProc.x)**2 + (midY - focusInProc.y)**2);
                if (dist > 150) continue; // Umbral de cercanía
            }

            if (angle < 20 || angle > 160) hLines.push({data: l, mid: midY});
            else if (angle > 70 && angle < 110) vLines.push({data: l, mid: midX});
        }

        if (hLines.length >= 2 && vLines.length >= 2) {
            hLines.sort((a,b) => a.mid - b.mid);
            vLines.sort((a,b) => a.mid - b.mid);

            let top = hLines[0].data;
            let bot = hLines[hLines.length-1].data;
            let left = vLines[0].data;
            let right = vLines[vLines.length-1].data;

            const pTL = getIntersection(top, left);
            const pTR = getIntersection(top, right);
            const pBR = getIntersection(bot, right);
            const pBL = getIntersection(bot, left);

            if (pTL && pTR && pBR && pBL) {
                const pts = [pTL, pTR, pBR, pBL];
                pts.forEach((p, i) => {
                    // Mapeo final de procCanvas a canvas visual
                    corners[i].x += (p.x * (canvas.width/procCanvas.width) - corners[i].x) * 0.2;
                    corners[i].y += (p.y * (canvas.height/procCanvas.height) - corners[i].y) * 0.2;
                });
                drawUI(corners);
            }
        }

        if (userFocus) drawFocusCircle();

        src.delete(); dst.delete(); lines.delete();
        requestAnimationFrame(processFrame);
    }

    function drawFocusCircle() {
        ctx.strokeStyle = "cyan";
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.arc(userFocus.x * canvas.width, userFocus.y * canvas.height, 60, 0, Math.PI*2);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    function drawUI(pts) {
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#00ff00';
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        pts.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.closePath();
        ctx.stroke();
    }
</script>
</body>
</html>
